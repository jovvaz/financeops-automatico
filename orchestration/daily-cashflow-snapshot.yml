id: daily-cashflow-snapshot
namespace: financeops.demo
triggers:
  - id: every_day
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "30 6 * * *"
tasks:
  - id: calculate_snapshot
    type: io.kestra.plugin.core.http.Request
    uri: "{{ secret('FINANCEOPS_URL') }}/api/automations/cashflow/run"
    method: POST
